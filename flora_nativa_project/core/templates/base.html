<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FloraNativa CL - {% block title %}Plantas Nativas de Chile{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        flora: {
                            50: '#f0fdf4',
                            100: '#dcfce7',
                            200: '#bbf7d0',
                            300: '#86efac',
                            400: '#4ade80',
                            500: '#22c55e',
                            600: '#16a34a',
                            700: '#15803d',
                            800: '#166534',
                            900: '#14532d',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">
    <nav class="bg-flora-700 text-white shadow-lg">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex justify-between items-center h-16">
                <a href="{% url 'home' %}" class="flex items-center space-x-2">
                    <span class="text-2xl">🌿</span>
                    <span class="font-bold text-xl">FloraNativa CL</span>
                </a>
                <div class="flex items-center space-x-4">
                    <a href="{% url 'home' %}" class="hover:text-flora-200 transition">Inicio</a>
                    <a href="{% url 'admin:index' %}" class="hover:text-flora-200 transition">Admin</a>
                    {% if user.is_authenticated %}
                        <span class="text-flora-200">Hola, {{ user.username }}</span>
                        <a href="{% url 'logout' %}" class="bg-red-600 hover:bg-red-700 px-3 py-1 rounded transition">Cerrar Sesión</a>
                    {% else %}
                        <a href="{% url 'login' %}" class="hover:text-flora-200 transition">Iniciar Sesión</a>
                        <a href="{% url 'registro' %}" class="bg-flora-500 hover:bg-flora-600 px-3 py-1 rounded transition">Registrarse</a>
                    {% endif %}
                </div>
            </div>
        </div>
    </nav>

    <main class="flex-grow max-w-7xl mx-auto px-4 py-8 w-full">
        {% block content %}{% endblock %}
    </main>

    <footer class="bg-flora-800 text-white text-center py-4">
        <p class="text-sm">FloraNativa CL &copy; {% now "Y" %} &mdash; Catalogo de Plantas Nativas de Chile</p>
    </footer>
</body>
</html>
